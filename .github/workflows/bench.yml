# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Benchmark Matrix

on:
  push:
    branches:
      - master
      - main
    paths:
      # Only trigger on code changes that affect performance
      - '**.rs'
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/bench.yml'
      - 'rust/benches/**'
    # Remove paths-ignore or restructure - GitHub doesn't allow both paths and paths-ignore
    # Use negative patterns in paths instead:
    # paths:
    #   - '**.rs'
    #   - '!**.md'  # Exclude markdown files
    #   - '!docs/**'

  pull_request:
    branches:
      - master
      - main
    paths:
      - '**.rs'
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/bench.yml'
      - 'rust/benches/**'
      - '**.md'

  # Allow manual trigger from Actions tab — useful for on-demand comparison runs
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # Let all runners complete even if one fails — we want all data points
      matrix:
        include:
          # ── x86_64 Linux ──────────────────────────────────────────────────────────
          # Intel Xeon Platinum 8370C or AMD EPYC 7763 — AVX2 guaranteed, AVX-512 disabled on Azure
          - os: ubuntu-latest
            name: Linux x64 (AVX2)
            artifact_suffix: linux-x64
            arch: x86_64
            expected_simd: avx2

          # ── ARM64 Linux ───────────────────────────────────────────────────────────
          # Ampere Altra (Neoverse N1) — NEON/ASIMD is mandatory on AArch64
          # GitHub free tier: ubuntu-24.04-arm is available on public repos
          - os: ubuntu-24.04-arm
            name: Linux ARM64 (NEON)
            artifact_suffix: linux-arm64
            arch: aarch64
            expected_simd: neon

          # ── x86_64 Windows ───────────────────────────────────────────────────────
          # Same Azure Xeon as Linux — verifies SIMD intrinsics work cross-OS
          - os: windows-latest
            name: Windows x64 (AVX2)
            artifact_suffix: windows-x64
            arch: x86_64
            expected_simd: avx2

          # ── ARM64 macOS (Apple Silicon) ───────────────────────────────────────────
          # M1 runner — NEON is always present, no AVX2
          # Note: macos-latest on GitHub is now ARM (M1) by default
          - os: macos-latest
            name: macOS ARM64 M1 (NEON)
            artifact_suffix: macos-arm64
            arch: aarch64
            expected_simd: neon

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Use stable channel — nightly not needed since we don't use nightly features.
      # target-cpu=native is passed via RUSTFLAGS below, not via toolchain.
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          # Key includes OS + arch + Cargo.lock hash for precise cache invalidation
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential

      # ── CPU Capability Detection ─────────────────────────────────────────────────
      # Dump raw CPU flags so we know exactly what this runner supports.
      # This is the "ground truth" for SIMD claims.
      # Note: || true on all grep/sysctl — a non-match must NOT fail the step
      #       because x86_64 and AArch64 use different /proc/cpuinfo key names:
      #         x86_64  → "flags"    (lowercase)
      #         AArch64 → "Features" (capital F)
      - name: Detect CPU capabilities
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-results

          echo "=== CPU INFO ===" | tee ci-results/cpu-info.txt

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            # Model name — present on both x86 and ARM
            grep -m1 'model name' /proc/cpuinfo | tee -a ci-results/cpu-info.txt || \
              grep -m1 'CPU part'  /proc/cpuinfo | tee -a ci-results/cpu-info.txt || true

            # x86_64 uses lowercase 'flags'; AArch64 uses 'Features'
            grep -m1 -E '^(flags|Features)\s*:' /proc/cpuinfo | tee -a ci-results/cpu-info.txt || true

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            # macOS: sysctl has CPU brand and features
            sysctl -n machdep.cpu.brand_string 2>/dev/null | tee -a ci-results/cpu-info.txt || \
              sysctl -n hw.model              2>/dev/null | tee -a ci-results/cpu-info.txt || true
            sysctl -n machdep.cpu.features    2>/dev/null | tee -a ci-results/cpu-info.txt || \
              echo "Apple Silicon — NEON implicit (ARMv8.5-A)" | tee -a ci-results/cpu-info.txt
            sysctl -n hw.optional.AdvSIMD     2>/dev/null | tee -a ci-results/cpu-info.txt || true

          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell -Command \
              "Get-WmiObject Win32_Processor | Select-Object Name, Description | Format-List" \
              | tee -a ci-results/cpu-info.txt || true
          fi

          # Cross-platform arch info — always available
          echo "RUNNER_ARCH=${RUNNER_ARCH}" | tee -a ci-results/cpu-info.txt
          echo "uname_m=$(uname -m 2>/dev/null || echo 'windows')" | tee -a ci-results/cpu-info.txt

          cat ci-results/cpu-info.txt

      - name: Show toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          rustc --version
          cargo --version

      - name: Capture runner metadata
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "image_os=${ImageOS:-unknown}"
            echo "image_version=${ImageVersion:-unknown}"
            echo "github_sha=${GITHUB_SHA}"
            echo "github_ref=${GITHUB_REF}"
            echo "rustc=$(rustc --version)"
            echo "cargo=$(cargo --version)"
          } > ci-results/runner-info.txt

      # ── Cargo Tests ──────────────────────────────────────────────────────────────
      # Always run correctness tests before benchmarks.
      # This catches AVX2-vs-scalar divergence and gear table issues early.
      - name: Run correctness tests
        shell: bash
        working-directory: rust
        env:
          # target-cpu=native enables AVX2 on x86 and NEON on ARM automatically
          RUSTFLAGS: "-C target-cpu=native"
        run: |
          cargo test -- --nocapture 2>&1 | tee ../ci-results/test.log

      # ── Criterion Benchmarks ──────────────────────────────────────────────────────
      # --color never: clean output for parsing
      # --output-format bencher: machine-readable lines (easier to grep than default)
      # Criterion runs 5s warmup + 10s measurement per benchmark by default
      - name: Run Criterion benchmarks
        shell: bash
        working-directory: rust
        env:
          RUSTFLAGS: "-C target-cpu=native"
        run: |
          cargo bench --bench cdc_bench -- --color never 2>&1 | tee ../ci-results/benchmark.log

      # ── Extract Key Numbers ───────────────────────────────────────────────────────
      # Pull throughput lines from Criterion output for the summary table.
      # Criterion prints: "thrpt:  [X GiB/s Y GiB/s Z GiB/s]" (low, median, high)
      - name: Extract benchmark results
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "=== SIMD THROUGHPUT SUMMARY (median) ==="
            # Criterion outputs benchmark name on one line, then time/thrpt on the next.
            # We grab the thrpt lines which immediately follow a benchmark name line.
            grep -E '(GearHash_Cutpoint|CDC_Pipeline|Data_Entropy|thrpt)' \
              ci-results/benchmark.log || echo "(no throughput data found)"
          } > ci-results/results-summary.txt

          cat ci-results/results-summary.txt

      # ── GitHub Actions Step Summary ───────────────────────────────────────────────
      # This renders as a formatted table directly in the Actions UI — no digging through logs needed.
      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## ${{ matrix.name }}"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Runner OS | ${RUNNER_OS} |"
            echo "| Architecture | ${RUNNER_ARCH} |"
            echo "| Expected SIMD | \`${{ matrix.expected_simd }}\` |"
            echo "| Runner Image | ${ImageOS:-unknown} ${ImageVersion:-unknown} |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Rust | \`$(rustc --version)\` |"
            echo
            echo "### CPU Capabilities"
            echo
            echo '```text'
            cat ci-results/cpu-info.txt || echo "(unavailable)"
            echo '```'
            echo
            echo "### Correctness Tests"
            echo
            echo '```text'
            grep -E '^(test |running |test result)' ci-results/test.log || echo "(unavailable)"
            echo '```'
            echo
            echo "### Benchmark Results (Throughput)"
            echo
            echo '```text'
            cat ci-results/results-summary.txt
            echo '```'
            echo
            echo "### Full Benchmark Output"
            echo
            echo '```text'
            cat ci-results/benchmark.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Upload Artifacts ──────────────────────────────────────────────────────────
      # Persists all CI results as downloadable artifacts for offline analysis.
      # Retained for 30 days (GitHub default for free tier).
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.artifact_suffix }}
          path: ci-results/
          if-no-files-found: error